<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NAZONEへのお問い合わせ">
  <title>CONTACT | NAZONE</title>
  <link rel="icon" href="assets/brand/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="stage">
    <header class="site-header" id="site-header"></header>

  <main class="page">
    <h1 class="page-title reveal">CONTACT</h1>
    <p class="contact-lead reveal" id="contact-lead"></p>
    <form class="contact-form reveal" id="contact-form">
      <div class="field">
        <label for="name">お名前/Name*</label>
        <input id="name" name="name" type="text" placeholder="Your Name" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">メールアドレス/Email*</label>
        <input id="email" name="email" type="email" placeholder="Email Address" required autocomplete="email">
      </div>
      <div class="field">
        <label for="message">本文/Message</label>
        <textarea id="message" name="message" placeholder="Put message here"></textarea>
      </div>
      <button class="btn-submit" type="submit">送信</button>
      <p class="form-note">送信するとメールアプリが開きます。<a href="privacy.html">プライバシーポリシー</a></p>
    </form>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  </div>

  <script src="js/site-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    NAZONE.init({ crumb: "CONTACT" });
    document.getElementById("contact-lead").textContent = SITE.contact.lead;

    document.getElementById("contact-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const subject = encodeURIComponent(`[NAZONE] お問い合わせ — ${name}`);
      const body = encodeURIComponent(
        `お名前: ${name}\nメール: ${email}\n\n${message}`
      );
      const to = SITE.contact.email || "";
      if (!to) {
        alert("送信先メールアドレスが未設定です。js/site-data.js の contact.email を設定してください。");
        return;
      }
      location.href = `mailto:${to}?subject=${subject}&body=${body}`;
    });
  </script>
</body>
</html>
