<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NAZONE 作品詳細">
  <title>WORK | NAZONE</title>
  <link rel="icon" href="assets/brand/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="stage">
    <header class="site-header" id="site-header"></header>

  <main class="page">
    <div class="container" id="work-detail"></div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  </div>

  <script src="js/site-data.js"></script>
  <script src="js/works-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const work = getWorkById(params.get("id") || "");

    NAZONE.init({ crumb: work ? work.title : "WORK" });

    const mount = document.getElementById("work-detail");
    if (!work) {
      mount.innerHTML = `
        <p style="text-align:center;margin:80px 0;">作品が見つかりませんでした。</p>
        <p style="text-align:center;"><a href="contents.html">CONTENTS へ戻る</a></p>`;
    } else {
      document.title = `${work.title} | NAZONE`;
      const story = work.story
        ? `<h3>【STORY】</h3><p>${work.story}</p>`
        : "";
      const about = work.about
        ? `<h3>【ABOUT】</h3><p>${work.about}</p>`
        : "";
      const meta =
        work.meta && work.meta.length
          ? `<ul>${work.meta.map((m) => `<li>${m}</li>`).join("")}</ul>`
          : "";
      const hashtag = work.hashtag
        ? `<p>ハッシュタグ：${work.hashtag}</p>`
        : "";
      const history =
        work.history && work.history.length
          ? `<h3>【過去の公演】</h3><ul>${work.history
              .map((h) => `<li>${h}</li>`)
              .join("")}</ul>`
          : "";

      mount.innerHTML = `
        <article class="work-detail reveal">
          <div class="work-detail__media">${NAZONE.workImageHtml(work)}</div>
          <div>
            <h1 class="work-detail__title">${work.title}</h1>
            <p style="color:var(--text-muted);font-size:13px;margin:0 0 8px;">${work.date}</p>
            ${story}
            ${about}
            ${meta}
            ${hashtag}
            ${history}
            <p style="margin-top:40px;">
              <a href="contents.html" style="font-size:13px;letter-spacing:0.1em;border-bottom:1px solid currentColor;">← CONTENTS</a>
            </p>
          </div>
        </article>`;
      NAZONE.observeReveal();
    }
  </script>
</body>
</html>
