<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NAZONE プライバシーポリシー">
  <title>PRIVACY POLICY | NAZONE</title>
  <link rel="icon" href="assets/brand/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="stage">
    <header class="site-header" id="site-header"></header>

  <main class="page">
    <h1 class="page-title reveal">PRIVACY POLICY</h1>
    <div class="container container--narrow" id="privacy-content"></div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>
  </div>

  <script src="data/site.js"></script>
  <script src="data/privacy.js"></script>
  <script src="js/main.js"></script>
  <script>
    NAZONE.init({ crumb: "PRIVACY" });
    const p = PRIVACY;
    document.getElementById("privacy-content").innerHTML = `
      <p class="reveal" style="margin-bottom:32px;font-size:14px;">${p.intro}</p>
      ${p.sections
        .map(
          (s) => `
        <section class="privacy-block reveal">
          <h2>${s.title}</h2>
          <p>${s.body}</p>
        </section>`
        )
        .join("")}
      <p class="reveal" style="margin-top:32px;font-size:13px;">
        お問い合わせは<a href="contact.html">こちら</a>
      </p>
    `;
    NAZONE.observeReveal();
  </script>
</body>
</html>
